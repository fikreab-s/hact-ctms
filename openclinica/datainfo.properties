# =============================================================================
# OpenClinica CE 3.17 — datainfo.properties
# Database connection + application settings
# Environment variables are substituted by the entrypoint script at runtime.
# =============================================================================

# Database Configuration
dbType=postgres
dbUser=clinica
dbPass=${OC_DB_PASSWORD}
db=openclinica
dbPort=5432
dbHost=oc-postgres

# File Storage Path (inside container)
filePath=${catalina.home}/openclinica.data/

# URL Config (behind NGINX reverse proxy)
sysURL=http://localhost/OpenClinica/
webapp=OpenClinica

# Mail Configuration (disabled for dev)
mailHost=
mailPort=25
mailProtocol=smtp
mailUsername=
mailPassword=
mailSmtpAuth=false
mailSmtpStarttls.enable=false
mailErrorMsg=Contact your system administrator for assistance.

# Facility Info
facilityName=HACT Clinical Trials
facilityCity=Addis Ababa
facilityState=
facilityZip=
facilityCountry=Ethiopia
facilityContactName=HACT Admin
facilityContactDegree=
facilityContactPhone=
facilityContactEmail=admin@hacts.org

# Misc
adminEmail=admin@hacts.org
supportURL=https://hacts.org
collectStats=false
designerURL=

# CRF File Upload
crf.file.extensionSettings=
crfFileExtensions=

# CDISC ODM Export  
ccts.soapUrl=
ccts.ocUrl=

# Usage Statistics
usage.stats.host=
usage.stats.port=
