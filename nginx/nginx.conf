# =============================================================================
# HACT CTMS — NGINX Reverse Proxy Configuration
# Routes: /api/ /admin/ → Django | /auth/ → Keycloak | /static/ /media/ → files
# SSL termination via Let's Encrypt (Certbot)
# =============================================================================

upstream django_backend {
    server django-api:8000;
}

upstream keycloak_backend {
    server keycloak:8080;
}

# =============================================================================
# HTTP → HTTPS Redirect (port 80)
# Allows ACME challenges through for certificate renewal
# =============================================================================
server {
    listen 80;
    server_name ctms.hacts.org;

    # Let's Encrypt ACME challenge (must be accessible over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (kept on HTTP for Docker internal checks)
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS Server (port 443)
# =============================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name ctms.hacts.org;

    # -------------------------------------------------------------------------
    # SSL Certificate (Let's Encrypt / Certbot)
    # -------------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/ctms.hacts.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ctms.hacts.org/privkey.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss;

    # Max upload size (for document uploads, lab data imports)
    client_max_body_size 50M;

    # -------------------------------------------------------------------------
    # Django API
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # -------------------------------------------------------------------------
    # Django Admin
    # -------------------------------------------------------------------------
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # -------------------------------------------------------------------------
    # OIDC Callback — React SPA handles /auth/callback (NOT Keycloak)
    # Must come BEFORE /auth/ block to prevent proxying to Keycloak
    # -------------------------------------------------------------------------
    location = /auth/callback {
        root /var/www/frontend;
        try_files /index.html =404;
    }

    # -------------------------------------------------------------------------
    # Keycloak (Identity & Access Management)
    # -------------------------------------------------------------------------
    location /auth/ {
        proxy_pass http://keycloak_backend/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # -------------------------------------------------------------------------
    # Static files (Django collectstatic output)
    # -------------------------------------------------------------------------
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------------------------------
    # Media files (user uploads)
    # -------------------------------------------------------------------------
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        access_log off;
    }

    # -------------------------------------------------------------------------
    # OIDC Callback (Keycloak → Django mozilla-django-oidc)
    # -------------------------------------------------------------------------
    location /oidc/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # -------------------------------------------------------------------------
    # ERPNext (Operations Management)
    # Using resolver pattern to allow NGINX to start without the container
    # -------------------------------------------------------------------------
    location ^~ /erpnext/ {
        resolver 127.0.0.11 valid=30s;
        set $erpnext_backend "http://erpnext-frontend:8080";

        # Rewrite URL to remove the /erpnext prefix before sending to backend
        rewrite ^/erpnext/(.*)$ /$1 break;

        proxy_pass $erpnext_backend;

        proxy_http_version 1.1;
        proxy_set_header Host hact.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite redirects to keep the user under /erpnext/
        proxy_redirect / /erpnext/;
        proxy_redirect http://hact.local/ /erpnext/;

        # Disable caching for API/App
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;

        # Handle errors gracefully if container is down
        error_page 502 504 = @erpnext_down;
    }

    location @erpnext_down {
        default_type application/json;
        return 503 '{"error": "ERPNext is currently unavailable. Please check if the service is running (docker compose --profile erpnext up -d)."}';
    }

    # -------------------------------------------------------------------------
    # ERPNext Assets & API fallback routing (for subdirectory hosting support)
    # -------------------------------------------------------------------------
    location ^~ /assets/ {
        # Try to serve Vite/React SPA frontend static assets first
        root /var/www/frontend;
        try_files $uri @erpnext_assets;
    }

    location @erpnext_assets {
        resolver 127.0.0.11 valid=30s ipv6=off;
        proxy_pass http://erpnext-frontend:8080;
        proxy_set_header Host hact.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /app {
        resolver 127.0.0.11 valid=30s ipv6=off;
        proxy_pass http://erpnext-frontend:8080;
        proxy_set_header Host hact.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/method/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        proxy_pass http://erpnext-frontend:8080;
        proxy_set_header Host hact.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io {
        resolver 127.0.0.11 valid=30s ipv6=off;
        proxy_pass http://erpnext-frontend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host hact.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /website_script.js {
        resolver 127.0.0.11 valid=30s ipv6=off;
        proxy_pass http://erpnext-frontend:8080;
        proxy_set_header Host hact.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /website_theme.css {
        resolver 127.0.0.11 valid=30s ipv6=off;
        proxy_pass http://erpnext-frontend:8080;
        proxy_set_header Host hact.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # SENAITE (Laboratory Information Management System)
    # Using resolver pattern to allow NGINX to start without the container
    # -------------------------------------------------------------------------
    location /senaite/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $senaite_upstream http://senaite:8080;

        # Use Plone's Virtual Host Monster (VHM) so SENAITE generates
        # correct URLs (assets, links) when served behind a proxy path.
        # Format: /VirtualHostBase/<proto>/<host>:<port>/<plone-site>/VirtualHostRoot/_vh_<prefix>/
        rewrite ^/senaite/(.*) /VirtualHostBase/http/$host:80/senaite/VirtualHostRoot/_vh_senaite/$1 break;

        proxy_pass $senaite_upstream;
        proxy_http_version 1.0;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 100M;

        error_page 502 504 = @senaite_down;
    }

    location @senaite_down {
        default_type application/json;
        return 503 '{"error": "SENAITE is currently unavailable. Start with: docker compose --profile senaite up -d"}';
    }

    # -------------------------------------------------------------------------
    # Health check endpoint (for monitoring)
    # -------------------------------------------------------------------------
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # -------------------------------------------------------------------------
    # OpenClinica CE (External — profile: openclinica)
    # Only available when started with: docker compose --profile openclinica up
    # Uses resolver + variable so NGINX starts even if OC is not running.
    # -------------------------------------------------------------------------
    location /OpenClinica/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $oc_upstream http://openclinica:8080;
        proxy_pass $oc_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 50M;
    }

    # -------------------------------------------------------------------------
    # Nextcloud eTMF (External — profile: nextcloud)
    # Only available when started with: docker compose --profile nextcloud up
    # Uses resolver + variable so NGINX starts even if NC is not running.
    # -------------------------------------------------------------------------
    location /nextcloud/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $nc_upstream http://nextcloud:80;

        # Strip /nextcloud prefix and proxy to Nextcloud root
        rewrite ^/nextcloud(/.*)$ $1 break;

        proxy_pass $nc_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 512M;

        # Nextcloud handles its own overwritewebroot path, no need to rewrite cookie paths here
    }

    # -------------------------------------------------------------------------
    # React SPA Frontend — client-side routing fallback
    # All unmatched routes serve index.html for React Router
    # -------------------------------------------------------------------------
    location / {
        root /var/www/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets (JS/CSS) but not index.html
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /var/www/frontend;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }
    }
}
