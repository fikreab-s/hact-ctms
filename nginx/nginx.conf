# =============================================================================
# HACT CTMS — NGINX Reverse Proxy Configuration
# Routes: /api/ /admin/ → Django | /auth/ → Keycloak | /static/ /media/ → files
# =============================================================================

upstream django_backend {
    server django-api:8000;
}

upstream keycloak_backend {
    server keycloak:8080;
}



server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss;

    # Max upload size (for document uploads, lab data imports)
    client_max_body_size 50M;

    # -------------------------------------------------------------------------
    # Django API
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # -------------------------------------------------------------------------
    # Django Admin
    # -------------------------------------------------------------------------
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # -------------------------------------------------------------------------
    # Keycloak (Identity & Access Management)
    # -------------------------------------------------------------------------
    location /auth/ {
        proxy_pass http://keycloak_backend/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # -------------------------------------------------------------------------
    # Static files (Django collectstatic output)
    # -------------------------------------------------------------------------
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------------------------------
    # Media files (user uploads)
    # -------------------------------------------------------------------------
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        access_log off;
    }

    # -------------------------------------------------------------------------
    # OIDC Callback (Keycloak → Django mozilla-django-oidc)
    # -------------------------------------------------------------------------
    location /oidc/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # -------------------------------------------------------------------------
    # Health check endpoint (for monitoring)
    # -------------------------------------------------------------------------
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # -------------------------------------------------------------------------
    # OpenClinica CE (External — profile: openclinica)
    # Only available when started with: docker compose --profile openclinica up
    # Uses resolver + variable so NGINX starts even if OC is not running.
    # -------------------------------------------------------------------------
    location /OpenClinica/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $oc_upstream http://openclinica:8080;
        proxy_pass $oc_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 50M;
    }

    # -------------------------------------------------------------------------
    # Root — future React frontend will be served here
    # -------------------------------------------------------------------------
    location / {
        # Placeholder: future React SPA will be served from here
        return 200 '{"status": "HACT CTMS is running", "version": "0.1.0"}';
        add_header Content-Type application/json;
    }
}
