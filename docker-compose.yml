###############################################################################
# HACT Clinical Trial Management System — Docker Compose
# Target: Developer machine (10 GB RAM, 120 GB SSD)
# Total container memory: ~4.4 GB (leaves ~5.6 GB for host OS + future services)
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # NGINX Reverse Proxy
  # Routes: /api/ → django, /admin/ → django, /auth/ → keycloak
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: hact-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      django-api:
        condition: service_healthy
    networks:
      - hact-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Django API Backend (Gunicorn)
  # ---------------------------------------------------------------------------
  django-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hact-django-api
    command: >
      gunicorn hact_ctms.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile - --log-level debug --capture-output
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - hact-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Celery Worker — Async task processing
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hact-celery-worker
    command: >
      celery -A hact_ctms worker --loglevel=info --concurrency=2 --max-tasks-per-child=100
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      django-api:
        condition: service_healthy
    networks:
      - hact-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Celery Beat — Scheduled task triggers
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hact-celery-beat
    command: >
      celery -A hact_ctms beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      django-api:
        condition: service_healthy
    networks:
      - hact-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Redis — Cache + Celery message broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hact-redis
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hact-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # PostgreSQL — HACT Custom Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hact-postgres
    ports:
      - "127.0.0.1:5433:5432" # Exposed for pgAdmin/DBeaver (localhost only, mapped to 5433)
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hact_ctms_db}
      POSTGRES_USER: ${POSTGRES_USER:-hact_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hact_admin} -d ${POSTGRES_DB:-hact_ctms_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hact-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Keycloak — Identity & Access Management (SSO / OIDC / 2FA)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: hact-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-keycloak-admin-password}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KC_DB_NAME:-keycloak_db}
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak_admin}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-change-me-keycloak-db-password}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HEALTH_ENABLED: "true"
      JAVA_OPTS_APPEND: "-Xms256m -Xmx512m"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - hact-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
        reservations:
          memory: 384M

  # ---------------------------------------------------------------------------
  # PostgreSQL — Keycloak Database (separate instance for isolation)
  # ---------------------------------------------------------------------------
  keycloak-db:
    image: postgres:16-alpine
    container_name: hact-keycloak-db
    environment:
      POSTGRES_DB: ${KC_DB_NAME:-keycloak_db}
      POSTGRES_USER: ${KC_DB_USER:-keycloak_admin}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-change-me-keycloak-db-password}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak_admin} -d ${KC_DB_NAME:-keycloak_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hact-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # ===========================================================================
  # EXTERNAL SYSTEMS — Docker Compose Profiles
  # These only start when their profile is explicitly activated:
  #   docker compose --profile openclinica up -d
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # PostgreSQL — OpenClinica Database (separate from HACT main DB)
  # ---------------------------------------------------------------------------
  oc-postgres:
    image: postgres:9.5
    container_name: hact-oc-postgres
    profiles: ["openclinica"]
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_INITDB_ARGS: "-E 'UTF-8' --locale=POSIX"
      POSTGRES_PASSWORD: ${OC_DB_PASSWORD:-change-me-oc-db-password}
      OC_DB_PASSWORD: ${OC_DB_PASSWORD:-change-me-oc-db-password}
    volumes:
      - oc_postgres_data:/var/lib/postgresql/data
      - ./openclinica/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hact-network
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # OpenClinica CE — Electronic Data Capture (Tomcat / Java)
  # Uses community image: piegsaj/openclinica:oc-3.13
  # Access: http://localhost:8088/OpenClinica  (direct)
  #         http://localhost/OpenClinica/       (via NGINX)
  # Default login: root / 12345678  (change on first login)
  # ---------------------------------------------------------------------------
  openclinica:
    image: piegsaj/openclinica:oc-3.13
    container_name: hact-openclinica
    profiles: ["openclinica"]
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      DB_TYPE: postgres
      DB_HOST: oc-postgres
      DB_USER: clinica
      DB_PASS: ${OC_DB_PASSWORD:-change-me-oc-db-password}
      DB_NAME: openclinica
      DB_PORT: "5432"
      CATALINA_OPTS: "-Xms256m -Xmx768m"
    volumes:
      - oc_data:/usr/local/tomcat/openclinica.data
    depends_on:
      oc-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/OpenClinica/MainMenu || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - hact-network
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Nextcloud — Document Management / eTMF (profile: nextcloud)
  # Access: http://localhost:8089  (direct)
  #         http://localhost/nextcloud/ (via NGINX)
  # Start:  docker compose --profile nextcloud up -d
  # ---------------------------------------------------------------------------
  nextcloud:
    image: nextcloud:28-apache
    container_name: hact-nextcloud
    profiles: ["nextcloud"]
    ports:
      - "127.0.0.1:8089:80"
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-hact-nc-2026}
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost nextcloud hact-nextcloud"
      SQLITE_DATABASE: nextcloud
      OVERWRITEPROTOCOL: http
      OVERWRITECLIURL: http://localhost/nextcloud
    volumes:
      - nextcloud_data:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - hact-network
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # MariaDB — ERPNext Database (profile: erpnext)
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:10.6
    container_name: hact-mariadb
    profiles: ["erpnext"]
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${ERPNEXT_DB_PASSWORD:-change-me-erpnext-db}
      MYSQL_DATABASE: erpnext
      MYSQL_USER: erpnext
      MYSQL_PASSWORD: ${ERPNEXT_DB_PASSWORD:-change-me-erpnext-db}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - hact-network
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # ERPNext Configurator — One-time site setup (profile: erpnext)
  # Writes common_site_config.json with DB/Redis connection info, then exits.
  # ---------------------------------------------------------------------------
  erpnext-configurator:
    image: frappe/erpnext:v15.15.0
    container_name: hact-erpnext-init
    profiles: ["erpnext"]
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_SOCKETIO";
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis:6379/2
      REDIS_QUEUE: redis:6379/3
      REDIS_SOCKETIO: redis:6379/4
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - hact-network

  # ---------------------------------------------------------------------------
  # ERPNext Backend — Gunicorn Python API (profile: erpnext)
  # Internal API endpoint for Django integration (http://erpnext:8000)
  # ---------------------------------------------------------------------------
  erpnext:
    image: frappe/erpnext:v15.15.0
    container_name: hact-erpnext
    profiles: ["erpnext"]
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext-configurator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
    networks:
      - hact-network
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # ERPNext Frontend — NGINX static assets + proxy (profile: erpnext)
  # Access: http://localhost:8080
  # ---------------------------------------------------------------------------
  erpnext-frontend:
    image: frappe/erpnext:v15.15.0
    container_name: hact-erpnext-frontend
    profiles: ["erpnext"]
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: erpnext:8000
      FRAPPE_SITE_NAME_HEADER: hact.localhost
      SOCKETIO: erpnext:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      erpnext:
        condition: service_started
    networks:
      - hact-network
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # ERPNext Worker — Background job processing (profile: erpnext)
  # ---------------------------------------------------------------------------
  erpnext-worker:
    image: frappe/erpnext:v15.15.0
    container_name: hact-erpnext-worker
    profiles: ["erpnext"]
    command:
      - bench
      - worker
      - --queue
      - short,default,long
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext:
        condition: service_started
    networks:
      - hact-network
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # ERPNext Scheduler — Periodic tasks (profile: erpnext)
  # ---------------------------------------------------------------------------
  erpnext-scheduler:
    image: frappe/erpnext:v15.15.0
    container_name: hact-erpnext-scheduler
    profiles: ["erpnext"]
    command:
      - bench
      - schedule
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext:
        condition: service_started
    networks:
      - hact-network
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: hact-postgres-data
  keycloak_db_data:
    name: hact-keycloak-db-data
  redis_data:
    name: hact-redis-data
  static_files:
    name: hact-static-files
  media_files:
    name: hact-media-files
  # OpenClinica (profile: openclinica)
  oc_postgres_data:
    name: hact-oc-postgres-data
  oc_data:
    name: hact-oc-data
  # Nextcloud (profile: nextcloud)
  nextcloud_data:
    name: hact-nextcloud-data
  # ERPNext (profile: erpnext)
  mariadb_data:
    name: hact-mariadb-data
  erpnext_sites:
    name: hact-erpnext-sites
  erpnext_logs:
    name: hact-erpnext-logs

# =============================================================================
# Networks
# =============================================================================
networks:
  hact-network:
    name: hact-network
    driver: bridge
